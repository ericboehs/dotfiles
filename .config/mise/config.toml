[env]
BAT_THEME = "ansi"
DISABLE_SPRING = "true"
DOCKER_SCAN_SUGGEST = "false"
VTK_DISABLE_ANALYTICS = "true"
CLAUDE_NOTIFY_SLACK = "false"
OBJC_DISABLE_INITIALIZE_FORK_SAFETY = "YES"
OP_BIOMETRIC_UNLOCK_ENABLED = "true"
GITLEAKS_CONFIG = "{{env.HOME}}/.config/gitleaks/config.toml"

[settings]
ruby.compile = false
idiomatic_version_file_enable_tools = ["node"]

[tools]
python = "3.12"
bun = "latest"
node = "24"
ruby = "4"
fnox = "latest"
# Dev-env tooling: gitleaks (pre-commit secret scanning, referenced by
# the .gitconfig hook), hk (project pre-commit manager, takes hk.pkl),
# pkl (Apple's config language hk uses), cloc (line-of-code counter for
# project large-file checks), watchexec (file-watch task runner).
gitleaks = "latest"
hk = "latest"
pkl = "latest"
"github:aldanial/cloc" = "latest"
watchexec = "latest"
aube = "latest"
